name: qweather-china
version: 1.2.0
description: 基于中国气象局数据的完整天气服务，通过和风天气API提供实时天气、天气预报、生活指数、空气质量等全方位天气信息。
author: uni-huang
license: MIT
homepage: https://dev.qweather.com/

requires:
  bins:
    - python3
    - curl
  python:
    - pyjwt>=2.0.0
    - cryptography>=3.0
    - requests>=2.25

install:
  windows:
    - python -m pip install pyjwt cryptography requests
    - echo "请前往 https://dev.qweather.com/ 注册并获取API认证信息"
    - echo "然后编辑 config.json 文件，配置您的API信息"
  linux:
    - python3 -m pip install pyjwt cryptography requests
    - echo "请前往 https://dev.qweather.com/ 注册并获取API认证信息"
    - echo "然后编辑 config.json 文件，配置您的API信息"
  macos:
    - python3 -m pip install pyjwt cryptography requests
    - echo "请前往 https://dev.qweather.com/ 注册并获取API认证信息"
    - echo "然后编辑 config.json 文件，配置您的API信息"

config:
  files:
    - config.json
  env:
    - QWEATHER_API_HOST
    - QWEATHER_PROJECT_ID
    - QWEATHER_CREDENTIALS_ID
    - QWEATHER_PRIVATE_KEY_PATH

triggers:
  - 天气
  - 气温
  - 预报
  - 温度
  - 下雨
  - 风
  - 湿度

examples:
  - "北京天气怎么样？"
  - "上海未来3天预报"
  - "广州需要带伞吗？"
  - "深圳穿什么？"
  - "杭州空气质量"
